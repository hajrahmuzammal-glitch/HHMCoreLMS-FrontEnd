<!-- homepage component html -->
<main class="homepage">
  <!-- Hero Section -->
  <div class="hero-layer">
    <app-hero class="animate-fade-in hero-component"></app-hero>
  </div>
  <!-- Stats Section (Rhombus Layout) -->
  <app-stats-section class="animate-fade-in-up animate-delay-3"></app-stats-section>
  <!-- Feature Section -->
  <div class="features-layer">
    <app-features-section class="animate-fade-in-up animate-delay-5"></app-features-section>
  </div>

  <!-- Featured Courses -->
  <app-courses-section class="animate-fade-in-up animate-delay-4"></app-courses-section>

  <!-- Trust Indicators -->
  <app-trust-indicators class="animate-fade-in animate-delay-1 trust-section"></app-trust-indicators>

  <!-- About Section -->
  <app-about-section class="animate-fade-in-up animate-delay-2"></app-about-section>





  <!-- Testimonials -->
  <app-testimonials class="animate-fade-in-up"></app-testimonials>

  <!-- CTA Section -->
  <app-cta-section class="animate-fade-in-up"></app-cta-section>
</main>
