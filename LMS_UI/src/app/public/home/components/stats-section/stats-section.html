<section class="stats-section" #statsSection>

  <!-- ── LEFT PANEL: Stats ────────────────────────────── -->
  <div class="panel-stats">

    <!-- Eyebrow -->
    <div class="eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-text">Our Numbers</span>
    </div>

    <!-- Heading -->
    <h2 class="panel-heading">
      Trusted by <span class="heading-highlight">Thousands</span><br>
      of Students
    </h2>

    <!-- 2×2 Stats Grid -->
    <div class="stats-grid">

      <!-- Cell 1: Students Enrolled -->
      <div class="stat-cell" #statCells>
        <div class="stat-number">
          <span class="stat-value" data-target="50000" data-suffix="k+">0</span>
          <!-- suffix rendered by TS -->
        </div>
        <span class="stat-label">Students Enrolled</span>
      </div>

      <!-- Cell 2: Courses Available -->
      <div class="stat-cell" #statCells>
        <div class="stat-number">
          <span class="stat-value" data-target="200" data-suffix="+">0</span>
        </div>
        <span class="stat-label">Courses Available</span>
      </div>

      <!-- Cell 3: Years of Excellence -->
      <div class="stat-cell" #statCells>
        <div class="stat-number">
          <span class="stat-value" data-target="15" data-suffix="+">0</span>
        </div>
        <span class="stat-label">Years of Excellence</span>
      </div>

      <!-- Cell 4: Satisfaction Rate -->
      <div class="stat-cell" #statCells>
        <div class="stat-number">
          <span class="stat-value" data-target="98" data-suffix="%">0</span>
        </div>
        <span class="stat-label">Satisfaction Rate</span>
      </div>

    </div>

    <!-- Footer strip -->
    <div class="panel-footer">
      <div class="footer-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
        <span>Accredited Institution</span>
      </div>
      <div class="footer-divider"></div>
      <span class="footer-since">Est. 2009</span>
    </div>

  </div>

  <!-- ── RIGHT PANEL: Image ───────────────────────────── -->
  <div class="panel-image">

    <!-- Gradient fade left edge -->
    <div class="image-fade"></div>

    <!-- Corner brackets -->
    <div class="bracket bracket-tr"></div>
    <div class="bracket bracket-bl"></div>

    <!-- Vertical accent line top-right -->
    <div class="image-accent-line"></div>

    <!-- University image -->
    <img
      src="images/library-bg-1.jpg"
      alt="HHM University Campus"
      loading="lazy"
    />

    <!-- Caption overlay -->
    <div class="image-caption">
      <div class="caption-text">
        <h3>HHM University Campus</h3>
        <p>Karachi, Pakistan · Est. 2009</p>
      </div>
      <div class="caption-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
        <span>Since 2009</span>
      </div>
    </div>

  </div>

</section>
